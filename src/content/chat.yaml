    text: |-
      his argument is basically part of a broader (obscure) tradition of arguments that let you refute the claim that physical dynamics work a certain way, if you start with the assumption that "everything must have a well-defined evolution arbitrarily far into the future", kind of a no-singularity hypothesis

      a more standard example of this is "if you have point-particles in a world with Newtonian gravity, then under gravity alone, they might fling themselves off to infinity in finite time"
  - sender: did:plc:v5mnhg4um4stba2yhsjdw7sw
    timestamp: "2026-07-10T03:16:48.028Z"
    text: |-
      ponens-tollens, you can take this mathematically proven claim, work backwards to "we must not have point particles moving under Newtonian gravity" using the no-singularity principle

      Koons describes a construction that is more agnostic to the details of physics, basically says "if you can construct a machine that satisfies a certain spec in relation to the machines around it, evolution becomes ill-defined, shit's busted", but he just selects the wrong premise to refute, because he doesn't notice that his premise "you can arbitrarily rescale and patch-together a new physical world out of parts from other worlds" is *inconsistent* with physics, not harmless

      and that observation, that it is inconsistent with the physics we know experimentally, but *also* possible to refute through this armchair argument, was the (!!) moment for me
