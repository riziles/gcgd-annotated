  - sender: did:plc:zgufzyadu3gghypxz4hp5psp
    timestamp: "2026-07-15T22:11:06.503Z"
    text: |-
      So soccer has one way to score (ball in net) and rewards with one point
      Games are low scoring
      Football has three ways (touchdown for 6, field goal for 3, safety for 2 or 1) + two modifiers (PAT for 1, 2 point conversion for 2)
      The touchdown requires a drive down the field, which is difficult and covers a lot of ground, so it's rewarded the most
      Field goal requires a solid kick, usually from a decent length, so it's the second most
      Safeties are prizes for the defense
      PAT is a field goal but easier, two point conversion requires running into the end zone but from a short distance and not after a drive
  - sender: did:plc:zgufzyadu3gghypxz4hp5psp
    timestamp: "2026-07-15T22:15:06.446Z"
