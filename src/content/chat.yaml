      the longer I have fable work on my wormhole project, the more inscrutable the outputs get

      I got this fragment out of it and with no dynamical systems background wasn't able to make sense of it:

      "Good question to push on, because the conditional distribution is still heavy-tailed — and I'd go further than "averaging is necessary": the plain mean isn't safe either. Conditional on agreement, deviation for a ray at distance r from the critical set scales like ε·κ(r), where κ blows up as a power of 1/r (winding time near the limit cycle grows like −log r, and deviation grows exponentially in winding time, so κ ~ r^(−λ/λ′) — a genuine power law, not just "big")."

      The definitions of lambda and lambda' are implicit here in a way that is not merely jargon but a kind of structural hyperjargon, where the meaning of a symbol is established by a combination of conventional usage in the relevant literature as well as its position in the parse tree of an expression of the appropriate shape
