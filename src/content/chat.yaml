    text: |-
      To make the identity claim work, you need something like structuralism, you need a way to map one to the other without remainder

      That's fine so far as it goes, but there are two fatal problems (that imo can now be overcome, but were fatal in the past)

      The first problem is the Newman problem. This says that if structure is a relation on a domain, then all structure inheres up to cardinality whereever any structure inheres. This is a problem for structuralist foundations, and forced repairs like David Lewis's "naturalness" and French and Ladyman's conception of modal structure
  - sender: godoglyness
    timestamp: "2026-07-21T19:08:40.917Z"
    text: The second problem is the identity of indiscernibles. If two structures are the same (qualitative twins) and you have an identity theory, it looks like you're on the hook for saying which of the twins you are. This is the cousin of the automorphism problem, which basically asks about handling indiscernibles. For example, in the complex field, you can freely permute i and -i, and distinguishing this symmetry with a structuralism is an analogous difficulty
