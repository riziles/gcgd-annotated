    text: |-
      Not quite, it's a much deeper issue. This one is pretty well documented, it was a major theme in the literature in the 1920s and 30s, and it came back to some extent later as well

      Newman is deceptively simple. He says

      "If structure is a relation R on a domain D, then just in saying you have R, you automatically entailing that you also have every other relation on that domain"
  - sender: godoglyness
    timestamp: "2026-07-21T19:21:21.879Z"
    text: All structure claims are trivial, basically, the only content of any assertion that there is some relation R turns out to be the cardinality of the domain, a single number
  - sender: godoglyness
    timestamp: "2026-07-21T19:22:29.183Z"
    text: The triviality was taken historically to mean that structure alone could not do the job, you needed some relation to be "natural" in a primitive way. Or you need what Ladyman says, some structure has a modal status
  - sender: godoglyness
    timestamp: "2026-07-21T19:23:40.851Z"
    text: But univalent foundations offers a mathematical formalism that bypasses the triviality. In univalent foundations, structure is ante rem (primitive) and the elements show up as pure place within the structure
  - sender: godoglyness
    timestamp: "2026-07-21T19:25:34.133Z"
    text: This used to be thought impossible because of the automorphism problem — if you make structure ante rem, what do you do with i and -i? It seems absurd to collapse them. Univalence overcomes this by giving us a rigorous way to count symmetries, so that eg C has one symmetry, swapping i and -i
  - sender: godoglyness
    timestamp: "2026-07-21T19:27:22.045Z"
    text: Anyway, univalence unblocks the whole thing, which hasn't been widely noticed. And then all you need is a good phenomenology. And I've been thinking about phenomenology my entire adult life so that's a piece I can supply.
