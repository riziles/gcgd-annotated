    text: It's a subtle point. One of the things I had to gloss over in that is that I didn't account at all for the "brightness" of a color, just its saturation. To avoid having tons of noise bird points whose saturation was essentially a random number because they were essentially black, I had to filter to a minimum average reflectivity
