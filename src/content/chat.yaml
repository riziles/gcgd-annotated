    text: |-
      The great work is just... vaguely boring unless you're into that kind of thing. I'll tell you all the secret sauce. You use univalence as a generalization of identity, which fixes structuralist foundations and blocks the famous Newman problem, making claims about structure contentful

      Then you tell paired mutually dependent stories

      One is about the objective inventory of the universe, which I claim is carrier free structure (since the carrier set is epiphenomenal). That's a normal ish claim

      The other is about the phenomenal field, the lichtung. I make the unusual argument that this too is a carrier free structure

      Then, these are by univalence identical and you've solved the whole problem with an identity theory

      The hard part is arguing that the clearing is pure structure, but tbh it's doable. So far as I know Fable is right that no one else has tried to use univalent foundations to repair identity theory
