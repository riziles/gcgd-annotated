    timestamp: "2026-07-06T23:25:29.086Z"
    text: But now that I'm trying to model which birds are "brightest" I don't want to just model colors that are most saturated, ie. have no light on the other side of the color wheel mixed in, but also how reflective they are in an absolute sense.
  - sender: did:plc:h25avmes6g7fgcddc3xj7qmg
    timestamp: "2026-07-06T23:26:18.872Z"
    text: CIELCH seems to do that pretty well, where it splits the colorspace into lightness, chroma, and hue. Chroma captures how strongly "colored" it is, and importantly for my purposes, is upperbounded by lightness. You can't actually have a high chroma value unless the light is bright enough to see it.
