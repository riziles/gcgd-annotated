    text: |-
      I'm increasingly convinced we shouldn't lock models down due to cyber until we see big incidents in the real world, sorry for this wall of text:

      I think that for AI cybersecurity, it might be better to have a reactive approach that limits model access only after a we see major AI cyberattacks in the wild vs a proactive one that limits them now: 
      - AI-assisted cyberattacks will be far from existential, and earlier ones will probably be less frequent and less powerful
      - Limiting access reduces the size of the prime window to make fixes. The maximum time available is between when the best models can do a given cyber task and when open source models can do it. Unless you can delay open source timelines, delaying access runs out an already limited clock.
      - Early cyberattacks will tell us about what the risk landscape looks like, better informing existing software maintainers about what fixes they most need to make.
