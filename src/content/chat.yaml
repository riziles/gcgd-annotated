      So these days, a common theory of consciousness many people believe and I don't believe, is functionalism. Functionalism maintains (roughly) that the phenomenal field — that is, the contents of consciousness — are an accomplishment of neural processing. They're an effect the brain causes, something neural computation does

      This is a common view because identity views ran into trouble. Identity views say that the phenomenal field is identical to some brain state, not that it's an effect of a cause, but that they're the same object considered in different ways
