    timestamp: "2026-07-21T19:12:23.015Z"
    text: |-
      Both of these problems can be resolved with recent developments in the philosophy of mathematics, Awodeys univalent foundations, in which identity isn't a primitive on/off but is a structured relation. You "count the symmetries" instead of encountering them as a problem

      This allows you to defeat the Newman problem (since the automorphism issue is what blocked a structure-first solution) and rescue identity theory

      Then the job is just explaining what the structure is, and how it could be that our phenomenology is pure structure without remainder

      That's a little tricky to explain in a chat window, but suffice it to say if it can be done identity theory is saved from obscurity
