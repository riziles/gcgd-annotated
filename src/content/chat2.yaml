    text: So basically, there was no formalism that made structure claims contentful (Newman's problem), there was no clarity on how to deal with symmetries (automorphism problem), and even if you could do that, it was thought that you were overdetermined to need carriers to make any meaningful assertions (Tarski). And all of these blockers are gone!
